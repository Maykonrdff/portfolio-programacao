<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOPO -->
    <header class="topo">
        <h2 class="logo">icarros</h2>

        <nav class="menu">
            <span>Comprar</span>
            <span>Vender</span>
            <span>Financiamento</span>
            <span>Troca</span>
        </nav>

        <input type="text" placeholder="Busque por marca e modelo" class="busca">
    </header>

    <!-- FILTROS -->
    <section class="filtros">
        <button>Goiânia - GO</button>
        <button>Preço</button>
        <button>Ano</button>
        <button>Marca</button>
        <button>Modelo</button>
    </section>

    <!-- CARDS -->
    <section class="carros">

        <div class="card">
            <img src="img/hb20.jpg" alt="HB20">

            <div class="info-card">
                <h3>Hyundai HB20</h3>
                <p class="desc">1.0 Manual</p>

                <p class="preco">R$ 78.999</p>
                <p class="extra">2024 • 48.000 km</p>

                <div class="botoes">
                    <button class="zap">whatsapp</button>
                    <button class="simular">simular</button>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="img/creta.jpg" alt="Creta">

            <div class="info-card">
                <h3>Hyundai Creta</h3>
                <p class="desc">Automático</p>

                <p class="preco">R$ 134.990</p>

                <p class="extra">2024 • 49.000 km</p>

                <div class="botoes">
                    <button class="zap">whatsapp</button>
                    <button class="simular">simular</button>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="img/clio.jpg" alt="Clio">

            <div class="info-card">
                <h3>Renault Clio</h3>
                <p class="desc">1.0 Flex Manual</p>

                <p class="preco">R$ 26.800</p>
                <p class="extra">2011 • 168.000 km</p>

                <div class="botoes">
                    <button class="zap">WhatsApp</button>
                    <button class="simular">Simular</button>
                </div>
            </div>
        </div>

    </section>

</body>

</html>
</html>
